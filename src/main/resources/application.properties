spring.application.name=notification-platform-backend

# PostgreSQL (override with env vars in local/dev/CI)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_platform_backend}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:sapassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true

# API / tenant context
app.tenant.header-name=${APP_TENANT_HEADER_NAME:X-Tenant-Key}
app.correlation.header-name=${APP_CORRELATION_HEADER_NAME:X-Correlation-Id}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:Content-Type,Authorization,X-Tenant-Key,X-Correlation-Id}
app.cors.exposed-headers=${APP_CORS_EXPOSED_HEADERS:X-Correlation-Id}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age-seconds=${APP_CORS_MAX_AGE_SECONDS:3600}

# Phase 10 scaling runtime
app.scaling.worker.enabled=${APP_SCALING_WORKER_ENABLED:true}
app.scaling.worker-id=${APP_SCALING_WORKER_ID:worker-local}
app.scaling.active-workers=${APP_SCALING_ACTIVE_WORKERS:1}
app.scaling.total-partitions=${APP_SCALING_TOTAL_PARTITIONS:128}
app.scaling.poll-batch-size=${APP_SCALING_POLL_BATCH_SIZE:200}
app.scaling.poll-delay-ms=${APP_SCALING_POLL_DELAY_MS:500}
app.scaling.lease-ttl-seconds=${APP_SCALING_LEASE_TTL_SECONDS:30}
app.scaling.rate-limit-per-minute=${APP_SCALING_RATE_LIMIT_PER_MINUTE:100}
app.scaling.retry.base-delay-seconds=${APP_SCALING_RETRY_BASE_DELAY_SECONDS:10}
app.scaling.retry.multiplier=${APP_SCALING_RETRY_MULTIPLIER:2}
app.scaling.retry.max-delay-seconds=${APP_SCALING_RETRY_MAX_DELAY_SECONDS:300}

# Structured logging pattern with MDC identifiers
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} correlationId=%X{correlationId:-} tenantKey=%X{tenantKey:-} tenantId=%X{tenantId:-} workerId=%X{workerId:-} - %msg%n
